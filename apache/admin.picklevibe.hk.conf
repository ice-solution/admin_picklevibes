# Apache 2.4+ Virtual Host — admin.picklevibe.hk
# 反向代理至本機 Node.js（請與 .env 的 PORT 一致，預設 3000）
#
# Cloudflare Flexible：訪客走 HTTPS，源站可為 HTTP；Express 需 TRUST_PROXY=1，
# 若 Cookie 無法維持登入，可在 .env 設 SESSION_COOKIE_SECURE=false
#
# 啟用所需模組（需 sudo）：
#   sudo a2enmod proxy proxy_http headers ssl
#   sudo a2ensite admin.picklevibe.hk
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# 將此檔複製到 Apache 設定目錄，例如：
#   sudo cp apache/admin.picklevibe.hk.conf /etc/apache2/sites-available/admin.picklevibe.hk.conf

<VirtualHost *:80>
    ServerName admin.picklevibe.hk

    # 上傳單據圖片（與應用程式 multer 上限對齊，約 8MB，此處給 10MB）
    LimitRequestBody 10485760

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # Cloudflare 送往源站的請求通常已含 X-Forwarded-Proto: https，會一併轉給 Node。
    # 若直連 Apache 測試且 Cookie 異常，可在 .env 設 SESSION_COOKIE_SECURE=false

    ErrorLog ${APACHE_LOG_DIR}/admin.picklevibe.hk-error.log
    CustomLog ${APACHE_LOG_DIR}/admin.picklevibe.hk-access.log combined
</VirtualHost>

# 若日後在源站終止 TLS（Cloudflare Full / Full strict），可再加一個 *:443 區塊，例如：
#
# <VirtualHost *:443>
#     ServerName admin.picklevibe.hk
#     SSLEngine on
#     SSLCertificateFile /path/to/fullchain.pem
#     SSLCertificateKeyFile /path/to/privkey.pem
#     LimitRequestBody 10485760
#     ProxyPreserveHost On
#     ProxyPass / http://127.0.0.1:3000/
#     ProxyPassReverse / http://127.0.0.1:3000/
#     RequestHeader set X-Forwarded-Proto "https"
#     ErrorLog ${APACHE_LOG_DIR}/admin.picklevibe.hk-ssl-error.log
#     CustomLog ${APACHE_LOG_DIR}/admin.picklevibe.hk-ssl-access.log combined
# </VirtualHost>
