# Nginx virtual host for admin.picklevibe.hk
# Cloudflare Flexible SSL: visitors use HTTPS to Cloudflare; origin can be HTTP (port 80).
# Ensure Cloudflare SSL/TLS mode is "Flexible" or "Full" depending on whether you terminate TLS on this server.
#
# Place this file in /etc/nginx/sites-available/ and symlink to sites-enabled:
#   sudo ln -s /etc/nginx/sites-available/admin.picklevibe.hk /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Adjust upstream port if your Node app listens on a different PORT (see .env).

upstream picklevibes_admin_node {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.picklevibe.hk;

    # Max upload size for receipt images (match or exceed multer limit in app)
    client_max_body_size 10m;

    location / {
        proxy_pass http://picklevibes_admin_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Cloudflare 會帶入訪客端的 HTTPS；若僅用 $scheme，在 Flexible 時可能永遠是 http
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}

# Optional: if you later use Cloudflare "Full (strict)" with a certificate on this machine,
# add a second server block listening on 443 ssl with your cert paths and the same location block.
